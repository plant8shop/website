<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>プラントショップ</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body data-page="home">
  <header class="site-header">
    <nav class="nav">
      <a href="index.html" class="nav-home">プラントショップ</a>
      <a href="#about">概要</a>
      <a href="#works">活動・参加者</a>
      <a href="#board">掲示板</a>
      <a href="#contact">連絡先</a>
    </nav>
  </header>

  <main>
    <section id="top" class="hero section">
      <div class="section-inner">
        <h1>プラントショップ</h1>
        <p class="lead">
          建築、映像、写真、文章などを横断しながら、ものの見方と生産のあり方を考える。
        </p>
      </div>
    </section>

    <section id="about" class="section">
      <div class="section-inner">
        <h2>概要</h2>
        <div id="aboutContent"></div>
      </div>
    </section>

    <section id="works" class="section">
      <div class="section-inner">
        <h2>活動・参加者</h2>
        <p class="subnote">
          左が活動一覧、右が参加者です。交点を押すと参加内容が表示されます。
        </p>
        <div id="worksGraph"></div>
      </div>
    </section>

    <section id="board" class="section">
      <div class="section-inner">
        <div class="section-head">
          <h2>掲示板</h2>
          <button id="openPostModalBtn" class="button">投稿する</button>
        </div>

        <div class="board-note">
          <p>「投稿する」から送信できます。</p>
        </div>

        <div id="boardList"></div>
      </div>
    </section>

    <section id="contact" class="section">
      <div class="section-inner">
        <h2>連絡先</h2>
        <div id="contactContent"></div>
      </div>
    </section>
  </main>

  <div id="tooltip" class="tooltip" hidden></div>

  <div id="postModal" class="modal" hidden>
    <div class="modal-backdrop" id="modalBackdrop"></div>
    <div class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="postModalTitle">
      <div class="modal-header">
        <h3 id="postModalTitle">掲示板に投稿</h3>
        <button id="closePostModalBtn" class="icon-button" type="button">×</button>
      </div>

      <form id="guestPostForm" class="post-form">
        <label class="form-field">
          <span>名前</span>
          <input type="text" name="name" maxlength="40" required />
        </label>

        <div class="form-field">
          <span>言及する作品</span>
          <div id="guestWorkCheckboxes" class="checkbox-list"></div>
          <small class="muted">作品なしでも投稿できます。複数選択可。</small>
        </div>

        <label class="form-field">
          <span>コメント</span>
          <textarea name="comment" rows="5" maxlength="500" required></textarea>
        </label>

        <div class="form-actions">
          <button type="submit" class="button">送信</button>
        </div>

        <p id="guestPostStatus" class="muted"></p>
      </form>
    </div>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
